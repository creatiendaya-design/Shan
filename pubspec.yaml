name: shannon
description: "App de finanzas personales Shannon"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Database
  drift: ^2.18.0
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.4
  path: ^1.9.0

  # Models
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Navigation
  go_router: ^14.6.2

  # Charts
  fl_chart: ^0.69.0

  # Utils
  intl: ^0.20.3
  uuid: ^4.5.1
  shared_preferences: ^2.3.3
  collection: ^1.19.1
  share_plus: ^12.0.2
  image_picker: ^1.1.2
  google_mlkit_text_recognition: ^0.14.0

  # Security
  flutter_secure_storage: ^9.2.2

  # Notifications
  flutter_local_notifications: ^18.0.1
  timezone: ^0.10.0

  # Backup / restore
  file_picker: ^8.1.2

  # Icons
  lucide_icons: ^0.257.0

  cupertino_icons: ^1.0.8
  google_fonts: ^8.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  drift_dev: ^2.18.0
  riverpod_generator: ^2.4.3
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
