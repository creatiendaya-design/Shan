workflows:
  ios-testflight:
    name: Shannon iOS → TestFlight
    max_build_duration: 60
    integrations:
      app_store_connect: creatiendaya@gmail.com
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      groups:
        - default
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.creatiendaya.shannon
    scripts:
      - name: Instalar dependencias
        script: |
          flutter pub get
          cd ios && pod install && cd ..
      - name: Configurar firma de código
        script: xcode-project use-profiles
      - name: Construir y firmar
        script: |
          flutter build ipa --release \
            --export-options-plist=/Users/builder/export_options.plist
      - name: Subir a TestFlight
        script: |
          xcrun altool --upload-app \
            --type ios \
            --file "$(find build/ios/ipa -name '*.ipa')" \
            --username "creatiendaya@gmail.com" \
            --password "$APP_SPECIFIC_PASSWORD"
    artifacts:
      - build/ios/ipa/*.ipa
