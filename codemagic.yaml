workflows:
  ios-testflight:
    name: Shannon iOS → TestFlight
    max_build_duration: 60
    integrations:
      app_store_connect: creatiendaya@gmail.com
    environment:
      flutter: stable
      xcode: 16.3
      cocoapods: default
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.creatiendaya.shannon
    scripts:
      - name: Instalar dependencias
        script: |
          flutter pub get
          cd ios && pod install && cd ..
      - name: Construir y firmar
        script: flutter build ipa --release
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        api_key: creatiendaya@gmail.com
        submit_to_testflight: true
