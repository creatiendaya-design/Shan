workflows:
  ios-testflight:
    name: Shannon iOS → TestFlight
    max_build_duration: 60
    integrations:
      app_store_connect: creatiendaya@gmail.com
    environment:
      flutter: stable
      xcode: 16.3
      cocoapods: default
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.creatiendaya.shannon
    scripts:
      - name: Instalar dependencias
        script: |
          flutter pub get
          cd ios && pod install && cd ..
      - name: Configurar firma de código
        script: xcode-project use-profiles
      - name: Construir y firmar
        script: |
          flutter build ipa --release \
            --export-options-plist=/Users/builder/export_options.plist
      - name: Subir a TestFlight
        script: |
          echo "$APP_STORE_CONNECT_PRIVATE_KEY" > /tmp/private_key.p8
          app-store-connect publish \
            --path "$(find build/ios/ipa -name '*.ipa')" \
            --key-id "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" \
            --private-key @file:/tmp/private_key.p8 \
            --testflight
    artifacts:
      - build/ios/ipa/*.ipa
