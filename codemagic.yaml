workflows:
  ios-unsigned:
    name: Shannon iOS (sin firma)
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: 16.3
      cocoapods: default
    scripts:
      - name: Instalar dependencias
        script: |
          flutter pub get
          cd ios && pod install && cd ..
      - name: Construir iOS sin firma
        script: |
          flutter build ios --release --no-codesign
          mkdir -p build/ios/iphoneos/Payload
          cp -r build/ios/iphoneos/Runner.app build/ios/iphoneos/Payload/
          cd build/ios/iphoneos
          zip -r Shannon.ipa Payload/
    artifacts:
      - build/ios/iphoneos/Shannon.ipa
